<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מהירות · מרחק · זמן</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1b2a; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

const SPEED_UNITS = [
  { label: "מ/ש", toMS: 1 },
  { label: 'ק"מ/ש', toMS: 1000 / 3600 },
];

const DIST_UNITS = [
  { label: 'מ"מ', toM: 0.001 },
  { label: 'ס"מ', toM: 0.01 },
  { label: "מטר", toM: 1 },
  { label: 'ק"מ', toM: 1000 },
  { label: 'מיליון ק"מ', toM: 1e9 },
];

const TIME_UNITS = [
  { label: "שניות", toS: 1 },
  { label: "דקות", toS: 60 },
  { label: "שעות", toS: 3600 },
];

function formatNum(num) {
  if (num === null || num === undefined || isNaN(num) || !isFinite(num)) return "—";
  if (num === 0) return "0";
  const abs = Math.abs(num);
  if (abs >= 0.001 && abs < 1e7) return parseFloat(num.toPrecision(6)).toLocaleString("he-IL");
  const exp = Math.floor(Math.log10(abs));
  const mantissa = num / Math.pow(10, exp);
  return `${parseFloat(mantissa.toPrecision(4))} × 10^${exp}`;
}

function MathLine({ text, style = {} }) {
  if (!text || !String(text).includes("×")) return <span style={style}>{text}</span>;
  const str = String(text);
  const m = str.match(/^(.*?)(10\^(-?\d+))(.*)$/);
  if (!m) return <span style={style}>{str}</span>;
  return (
    <span style={style}>
      {m[1]}10<sup>{m[3]}</sup>{m[4]}
    </span>
  );
}

function DVTTriangle({ highlight }) {
  const S = 110;
  const cx = S / 2;
  const colors = {
    distance: highlight === "distance" ? "#34d399" : "#1e3a5f",
    speed: highlight === "speed" ? "#60a5fa" : "#1e3a5f",
    time: highlight === "time" ? "#f59e0b" : "#1e3a5f",
  };
  const tc = {
    distance: highlight === "distance" ? "#0f172a" : "#475569",
    speed: highlight === "speed" ? "#0f172a" : "#475569",
    time: highlight === "time" ? "#0f172a" : "#475569",
  };
  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} style={{ flexShrink: 0 }}>
      <polygon points={`${cx},6 ${S-6},${S-6} 6,${S-6}`} fill="none" stroke="#334155" strokeWidth="2" />
      <polygon points={`${cx},6 ${cx-26},${S/2+2} ${cx+26},${S/2+2}`} fill={colors.distance} />
      <text x={cx} y={S/2-8} textAnchor="middle" fontSize="14" fontWeight="bold" fill={tc.distance} fontFamily="monospace">d</text>
      <polygon points={`${cx-26},${S/2+2} 6,${S-6} ${cx},${S-6}`} fill={colors.speed} />
      <text x={cx/2} y={S-16} textAnchor="middle" fontSize="14" fontWeight="bold" fill={tc.speed} fontFamily="monospace">v</text>
      <polygon points={`${cx+26},${S/2+2} ${cx},${S-6} ${S-6},${S-6}`} fill={colors.time} />
      <text x={cx+cx/2} y={S-16} textAnchor="middle" fontSize="14" fontWeight="bold" fill={tc.time} fontFamily="monospace">t</text>
      <line x1={cx-26} y1={S/2+2} x2={cx+26} y2={S/2+2} stroke="#0f172a" strokeWidth="1.5" />
      <line x1={cx} y1={S/2+2} x2={cx} y2={S-6} stroke="#0f172a" strokeWidth="1.5" />
    </svg>
  );
}

// Renders a math line cleanly: numbers/operators LTR, Hebrew labels RTL
function MathExpr({ parts }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", flexWrap: "wrap", gap: "0 4px", direction: "ltr" }}>
      {parts.map((p, i) => {
        if (p.hebrew) {
          return <span key={i} style={{ direction: "rtl", fontFamily: "'Segoe UI', Tahoma, sans-serif", fontSize: 13, color: "#94a3b8" }}>{p.text}</span>;
        }
        // Handle scientific notation: "3 × 10^-6"
        const sciMatch = p.text && String(p.text).match(/^(.*?)([\d.]+)\s*×\s*10\^(-?\d+)(.*)$/);
        if (sciMatch) {
          return (
            <span key={i} style={{ fontFamily: "monospace", color: "#cbd5e1" }}>
              {sciMatch[1]}{sciMatch[2]} × 10<sup>{sciMatch[3]}</sup>{sciMatch[4]}
            </span>
          );
        }
        return <span key={i} style={{ fontFamily: "monospace", color: "#cbd5e1" }}>{p.text}</span>;
      })}
    </span>
  );
}

// Build explicit unit-conversion sub-steps with full arithmetic shown
// smartBase: the "working units" chosen to minimize conversions
function buildConvSteps(distVal, distUnit, timeVal, timeUnit, speedVal, speedUnit, solve) {
  const steps = [];
  const dLabel = DIST_UNITS[distUnit].label;
  const tLabel = TIME_UNITS[timeUnit].label;
  const vLabel = SPEED_UNITS[speedUnit].label;

  // When solving for speed in ק"מ/ש — or distance/time with ק"מ/ש speed:
  // prefer working in ק"מ + שעות
  if (speedUnit === 1 && (solve === "speed" || solve === "distance" || solve === "time")) {
    if (solve === "speed" || solve === "time") {
      // Need ק"מ for distance input
      if (solve !== "distance" && distUnit !== 3) {
        const toKM = DIST_UNITS[distUnit].toM / 1000;
        const dKM = parseFloat(distVal) * toKM;
        const op = toKM < 1 ? `÷ ${1/toKM}` : `× ${toKM}`;
        steps.push({
          field: "dist",
          parts: [
            { text: distVal }, { text: " " }, { text: dLabel, hebrew: true },
            { text: `  ${op}  =  ${formatNum(dKM)}` }, { text: ' ק"מ', hebrew: true }
          ],
          explain: `כי 1 ${dLabel} = ${toKM} ק"מ`
        });
      }
    }
    if (solve === "speed" || solve === "distance") {
      // Need שעות for time input
      if (solve !== "time" && timeUnit !== 2) {
        const toH = TIME_UNITS[timeUnit].toS / 3600;
        const tH = parseFloat(timeVal) * toH;
        const divisor = 3600 / TIME_UNITS[timeUnit].toS; // e.g. 60 for minutes
        const op = toH < 1 ? `÷ ${divisor}` : `× ${toH}`;
        steps.push({
          field: "time",
          parts: [
            { text: timeVal }, { text: " " }, { text: tLabel, hebrew: true },
            { text: `  ${op}  =  ${formatNum(tH)}` }, { text: " שעות", hebrew: true }
          ],
          explain: `כי 1 שעה = ${divisor} ${tLabel}  →  ${timeVal} ÷ ${divisor} = ${formatNum(tH)} שעות`,
          division: Number.isInteger(parseFloat(timeVal)) && Number.isInteger(divisor)
            ? { numerator: parseFloat(timeVal), denominator: divisor }
            : null
        });
      }
    }
    return steps;
  }

  // Default base: meters + seconds + m/s
  if (solve !== "distance" && distUnit !== 2) {
    const factor = DIST_UNITS[distUnit].toM;
    const dM = parseFloat(distVal) * factor;
    const op = factor < 1 ? `÷ ${1/factor}` : `× ${factor}`;
    steps.push({
      field: "dist",
      parts: [
        { text: distVal }, { text: " " }, { text: dLabel, hebrew: true },
        { text: `  ${op}  =  ${formatNum(dM)}` }, { text: " מטר", hebrew: true }
      ],
      explain: `כי 1 ${dLabel} = ${factor >= 1 ? factor : `1/${1/factor}`} מטר`
    });
  }

  if (solve !== "time" && timeUnit !== 0) {
    const factor = TIME_UNITS[timeUnit].toS;
    const tS = parseFloat(timeVal) * factor;
    steps.push({
      field: "time",
      parts: [
        { text: timeVal }, { text: " " }, { text: tLabel, hebrew: true },
        { text: `  ×  ${factor}  =  ${formatNum(tS)}` }, { text: " שניות", hebrew: true }
      ],
      explain: `כי 1 ${tLabel} = ${factor} שניות  →  ${timeVal} × ${factor} = ${formatNum(tS)} שניות`
    });
  }

  if (solve !== "speed" && speedUnit !== 0) {
    const vMS = parseFloat(speedVal) * SPEED_UNITS[speedUnit].toMS;
    // Break into two intuitive sub-steps: ×1000 (km→m) then ÷3600 (h→s)
    const vKM = parseFloat(speedVal) * 1000; // meters per hour
    steps.push({
      field: "speed",
      subSteps: [
        {
          parts: [
            { text: speedVal }, { text: ' ק"מ/ש', hebrew: true },
            { text: "  ×  1000  =  " + formatNum(vKM) }, { text: " מ/ש", hebrew: true }
          ],
          note: 'שלב א׳: כל ק"מ = 1000 מטר'
        },
        {
          parts: [
            { text: formatNum(vKM) }, { text: " מ/שעה", hebrew: true },
            { text: "  ÷  3600  =  " + formatNum(vMS) }, { text: " מ/ש", hebrew: true }
          ],
          note: 'שלב ב׳: כל שעה = 3600 שניות'
        }
      ],
      result: vMS
    });
  }

  return steps;
}

function StepByStep({ solve, distVal, distUnit, timeVal, timeUnit, speedVal, speedUnit, result }) {
  const dLabel = DIST_UNITS[distUnit].label;
  const tLabel = TIME_UNITS[timeUnit].label;
  const vLabel = SPEED_UNITS[speedUnit].label;
  const dM = parseFloat(distVal) * DIST_UNITS[distUnit].toM;
  const tS = parseFloat(timeVal) * TIME_UNITS[timeUnit].toS;
  const vMS = parseFloat(speedVal) * SPEED_UNITS[speedUnit].toMS;

  // Smart working units:
  // - speed in ק"מ/ש → work in ק"מ + שעות
  // - distance with km/h speed → work in ק"מ + שעות directly
  // - time with km/h speed → work in ק"מ + שעות directly
  const useKMH = solve === "speed" && speedUnit === 1;
  const useKMH_dist = solve === "distance" && speedUnit === 1; // ק"מ/ש × שעות = ק"מ
  const useKMH_time = solve === "time" && speedUnit === 1;     // ק"מ ÷ ק"מ/ש = שעות
  const dKM = dM / 1000;
  const tH = tS / 3600;

  // Which conversions are actually needed?
  let needsDistConv, needsTimeConv, needsSpeedConv;
  if (useKMH) {
    needsDistConv = distUnit !== 3;
    needsTimeConv = timeUnit !== 2;
    needsSpeedConv = false;
  } else if (useKMH_dist) {
    // working in ק"מ/ש × שעות → result in ק"מ
    needsDistConv = false;
    needsTimeConv = timeUnit !== 2; // need שעות
    needsSpeedConv = false;
  } else if (useKMH_time) {
    // working in ק"מ ÷ ק"מ/ש → result in שעות
    needsDistConv = distUnit !== 3; // need ק"מ
    needsTimeConv = false;
    needsSpeedConv = false;
  } else {
    needsDistConv = solve !== "distance" && distUnit !== 2;
    needsTimeConv = solve !== "time" && timeUnit !== 0;
    needsSpeedConv = solve !== "speed" && speedUnit !== 0;
  }
  const needsAnyConv = needsDistConv || needsTimeConv || needsSpeedConv;

  const convSteps = buildConvSteps(distVal, distUnit, timeVal, timeUnit, speedVal, speedUnit, solve);

  // Calc step values using smart working units
  let calcParts;
  let calcMultiLine = null; // used when scientific notation makes single line unreadable
  let tip = "";
  let formula = "";
  let story = "";

  if (solve === "speed") {
    formula = "v = d ÷ t";
    if (useKMH) {
      story = 'נחלק ק"מ בשעות — התוצאה ישירות בק"מ/ש, ללא המרה נוספת!';
      const d = needsDistConv ? dKM : parseFloat(distVal);
      const t = needsTimeConv ? tH : parseFloat(timeVal);
      const dU = needsDistConv ? 'ק"מ' : dLabel;
      const tU = needsTimeConv ? "שעות" : tLabel;
      calcParts = [
        { text: "v = " }, { text: formatNum(d) }, { text: " " }, { text: dU, hebrew: true },
        { text: "  ÷  " }, { text: formatNum(t) }, { text: " " }, { text: tU, hebrew: true },
        { text: "  =  " }, { text: formatNum(result) }, { text: ` ${vLabel}`, hebrew: true }
      ];
    } else {
      story = "נחלק את המרחק בזמן — כמה מטרים עוברים בכל שנייה, זו המהירות!";
      // Check if either value uses scientific notation (very large or very small)
      const dStr = formatNum(dM);
      const tStr = formatNum(tS);
      const isSci = dStr.includes("×") || tStr.includes("×");
      if (isSci) {
        // Parse scientific notation components for step-by-step arithmetic
        const parseSci = (s) => {
          const m = String(s).match(/^([\d.]+)\s*×\s*10\^(-?\d+)$/);
          if (m) return { coeff: parseFloat(m[1]), exp: parseInt(m[2]), isSci: true };
          return { coeff: parseFloat(s), exp: 0, isSci: false };
        };
        const dParsed = parseSci(dStr);
        const tParsed = parseSci(tStr);
        const coeffDiv = dParsed.coeff / tParsed.coeff;
        const expDiff = dParsed.exp - tParsed.exp;
        const coeffStr = parseFloat(coeffDiv.toPrecision(4));
        const finalVal = formatNum(result);

        calcParts = null;
        calcMultiLine = [
          // Line 1: what we're dividing
          [
            { text: "v  =  " },
            { text: dStr }, { text: " מטר", hebrew: true },
            { text: "  ÷  " },
            { text: tStr }, { text: " שניות", hebrew: true },
          ],
          // Line 2: separate coefficients and exponents
          [
            { text: `   =  (${dParsed.coeff} ÷ ${tParsed.coeff})  ×  (10^${dParsed.exp} ÷ 10^${tParsed.exp})` },
          ],
          // Line 3: rule - subtract exponents
          [
            { text: `   =  ${coeffStr}  ×  10^(${dParsed.exp}${tParsed.exp >= 0 ? '−' : '+'}${Math.abs(tParsed.exp)})` },
            { text: "    ← מחסרים מעריכים", hebrew: true },
          ],
          // Line 4: simplified
          [
            { text: `   =  ${coeffStr}  ×  10^${expDiff}` },
          ],
          // Line 5: result
          [
            { text: `   =  ${finalVal}` }, { text: " מ/ש", hebrew: true },
          ],
        ];
      } else {
        calcParts = [
          { text: "v = " }, { text: dStr }, { text: " מטר", hebrew: true },
          { text: "  ÷  " }, { text: tStr }, { text: " שניות", hebrew: true },
          { text: "  =  " }, { text: formatNum(result) }, { text: " מ/ש", hebrew: true }
        ];
      }
    }
    tip = useKMH ? '💡 ק"מ ÷ שעות = ק"מ/ש — פשוט ואינטואיטיבי!' : "💡 10 מ/ש = 10 מטר בכל שנייה. ככל שהמספר גדול — מהר יותר!";
  } else if (solve === "distance") {
    formula = "d = v × t";
    if (useKMH_dist) {
      // Work in ק"מ/ש × שעות → ק"מ, then convert to requested dist unit if needed
      const t = needsTimeConv ? tH : parseFloat(timeVal);
      const tU = needsTimeConv ? "שעות" : tLabel;
      const dKMresult = parseFloat(speedVal) * t;
      story = 'נכפיל ק"מ/ש בשעות — התוצאה ישירות בק"מ!';
      calcParts = [
        { text: "d = " }, { text: speedVal }, { text: ' ק"מ/ש', hebrew: true },
        { text: "  ×  " }, { text: formatNum(t) }, { text: " " }, { text: tU, hebrew: true },
        { text: "  =  " }, { text: formatNum(dKMresult) }, { text: ' ק"מ', hebrew: true }
      ];
    } else {
      story = "נכפיל מהירות בזמן — כמה מרחק עובר גוף שנע בקצב הזה לאורך הזמן הזה.";
      calcParts = [
        { text: "d = " }, { text: formatNum(vMS) }, { text: " מ/ש", hebrew: true },
        { text: "  ×  " }, { text: formatNum(tS) }, { text: " שניות", hebrew: true },
        { text: "  =  " }, { text: formatNum(vMS*tS) }, { text: " מטר", hebrew: true }
      ];
    }
    tip = "💡 מהיר יותר × זמן ארוך יותר = מרחק גדול יותר!";
  } else {
    formula = "t = d ÷ v";
    if (useKMH_time) {
      // Work in ק"מ ÷ ק"מ/ש → שעות
      const d = needsDistConv ? dKM : parseFloat(distVal);
      const dU = needsDistConv ? 'ק"מ' : dLabel;
      const tHresult = d / parseFloat(speedVal);
      story = 'נחלק ק"מ בק"מ/ש — התוצאה ישירות בשעות!';
      calcParts = [
        { text: "t = " }, { text: formatNum(d) }, { text: " " }, { text: dU, hebrew: true },
        { text: "  ÷  " }, { text: speedVal }, { text: ' ק"מ/ש', hebrew: true },
        { text: "  =  " }, { text: formatNum(tHresult) }, { text: " שעות", hebrew: true }
      ];
    } else {
      story = "נחלק מרחק במהירות — כמה זמן לוקח לעבור את המרחק הזה.";
      calcParts = [
        { text: "t = " }, { text: formatNum(dM) }, { text: " מטר", hebrew: true },
        { text: "  ÷  " }, { text: formatNum(vMS) }, { text: " מ/ש", hebrew: true },
        { text: "  =  " }, { text: formatNum(dM/vMS) }, { text: " שניות", hebrew: true }
      ];
    }
    tip = "💡 מהיר יותר = פחות זמן. פחות מרחק = פחות זמן!";
  }

  // Input line
  const inputParts =
    solve === "speed"
      ? [{ text: "v = " }, { text: distVal }, { text: " " }, { text: dLabel, hebrew: true }, { text: "  ÷  " }, { text: timeVal }, { text: " " }, { text: tLabel, hebrew: true }]
      : solve === "distance"
      ? [{ text: "d = " }, { text: speedVal }, { text: " " }, { text: vLabel, hebrew: true }, { text: "  ×  " }, { text: timeVal }, { text: " " }, { text: tLabel, hebrew: true }]
      : [{ text: "t = " }, { text: distVal }, { text: " " }, { text: dLabel, hebrew: true }, { text: "  ÷  " }, { text: speedVal }, { text: " " }, { text: vLabel, hebrew: true }];

  // Result conversion — only needed when result came out in base units and user wants different units
  let resultConvParts = null;
  let resultConvNote = null;
  const anyKMH = useKMH || useKMH_dist || useKMH_time;
  if (!anyKMH) {
    if (solve === "speed" && speedUnit !== 0) {
      resultConvParts = [
        { text: formatNum(dM/tS) }, { text: " מ/ש", hebrew: true },
        { text: "  ×  3.6  =  " + formatNum(result) },
        { text: ` ${vLabel}`, hebrew: true }
      ];
      resultConvNote = 'כי 1 מ/ש = 3.6 ק"מ/ש';
    } else if (solve === "distance" && distUnit !== 2) {
      const factor = DIST_UNITS[distUnit].toM;
      const op = factor >= 1 ? `÷ ${factor}` : `× ${1/factor}`;
      resultConvParts = [
        { text: formatNum(vMS*tS) }, { text: " מטר", hebrew: true },
        { text: `  ${op}  =  ${formatNum(result)}` },
        { text: ` ${dLabel}`, hebrew: true }
      ];
      resultConvNote = `כי 1 ${dLabel} = ${factor} מטר`;
    } else if (solve === "time" && timeUnit !== 0) {
      const factor = TIME_UNITS[timeUnit].toS;
      resultConvParts = [
        { text: formatNum(dM/vMS) }, { text: " שניות", hebrew: true },
        { text: `  ÷  ${factor}  =  ${formatNum(result)}` },
        { text: ` ${tLabel}`, hebrew: true }
      ];
      resultConvNote = `כי 1 ${tLabel} = ${factor} שניות`;
    }
  } else if (useKMH_dist && distUnit !== 3) {
    // Result is in ק"מ but user wants different dist unit
    const dKMresult = parseFloat(speedVal) * (needsTimeConv ? tH : parseFloat(timeVal));
    const factor = DIST_UNITS[distUnit].toM / 1000;
    const op = factor >= 1 ? `× ${factor}` : `÷ ${1/factor}`;
    resultConvParts = [
      { text: formatNum(dKMresult) }, { text: ' ק"מ', hebrew: true },
      { text: `  ${op}  =  ${formatNum(result)}` },
      { text: ` ${dLabel}`, hebrew: true }
    ];
    resultConvNote = `המרה ל-${dLabel}`;
  } else if (useKMH_time && timeUnit !== 2) {
    // Result is in שעות but user wants different time unit
    const d = needsDistConv ? dKM : parseFloat(distVal);
    const tHresult = d / parseFloat(speedVal);
    const factor = TIME_UNITS[timeUnit].toS / 3600;
    const op = factor >= 1 ? `× ${factor}` : `÷ ${1/factor}`;
    resultConvParts = [
      { text: formatNum(tHresult) }, { text: " שעות", hebrew: true },
      { text: `  ${op}  =  ${formatNum(result)}` },
      { text: ` ${tLabel}`, hebrew: true }
    ];
    resultConvNote = `המרה ל-${tLabel}`;
  }

  const resultUnit = solve === "speed" ? vLabel : solve === "distance" ? dLabel : tLabel;
  const color = solve === "speed" ? "#60a5fa" : solve === "distance" ? "#34d399" : "#f59e0b";
  const fieldColor = { dist: "#34d399", time: "#f59e0b", speed: "#60a5fa" };
  let stepNum = 0;
  const nextN = () => ++stepNum;

// Long division visual component
function LongDivision({ numerator, denominator }) {
  // Generate steps of long division
  const steps = [];
  let remainder = numerator;
  let digits = [];
  let maxSteps = 4;
  
  // Integer part
  const intPart = Math.floor(numerator / denominator);
  digits.push(intPart === 0 ? "0" : String(intPart));
  remainder = numerator - intPart * denominator;
  
  if (remainder > 0) digits.push(".");
  
  for (let i = 0; i < maxSteps && remainder > 0; i++) {
    remainder *= 10;
    const digit = Math.floor(remainder / denominator);
    const used = digit * denominator;
    const newRemainder = remainder - used;
    steps.push({ bring: remainder, digit, used, remainder: newRemainder });
    digits.push(String(digit));
    remainder = newRemainder;
  }
  if (remainder > 0) digits.push("...");

  const result = digits.join("");

  return (
    <div style={{ marginTop: 8, padding: "10px 12px", borderRadius: 8, background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.07)", direction: "ltr" }}>
      <div style={{ fontSize: 11, color: "#475569", marginBottom: 8, direction: "rtl" }}>📐 חילוק ארוך — צעד אחר צעד:</div>
      
      {/* Division setup */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10, fontSize: 14, fontFamily: "monospace", color: "#cbd5e1" }}>
        <span>{numerator}</span>
        <span style={{ color: "#475569" }}>÷</span>
        <span>{denominator}</span>
        <span style={{ color: "#475569" }}>=</span>
        <span style={{ color: "#60a5fa", fontWeight: 800 }}>{result}</span>
      </div>

      {/* Steps */}
      {steps.map((s, i) => (
        <div key={i} style={{ marginBottom: 6, paddingRight: 8, borderRight: "2px solid rgba(96,165,250,0.3)" }}>
          <div style={{ fontSize: 12, color: "#64748b", direction: "rtl", marginBottom: 2 }}>
            שלב {i + 1}: {i === 0 && intPart === 0 ? `${numerator} קטן מ-${denominator}, אז נוסיף נקודה ונכפיל ב-10` : `שארית ${steps[i-1]?.remainder ?? numerator} × 10`}
          </div>
          <div style={{ fontSize: 13, fontFamily: "monospace", color: "#cbd5e1" }}>
            {s.bring} ÷ {denominator} = <span style={{ color: "#f59e0b", fontWeight: 700 }}>{s.digit}</span>
            <span style={{ color: "#475569", fontSize: 11 }}>  ({denominator} × {s.digit} = {s.used})</span>
          </div>
          <div style={{ fontSize: 12, fontFamily: "monospace", color: "#94a3b8" }}>
            {s.bring} − {s.used} = <span style={{ color: "#34d399" }}>{s.remainder}</span>
            <span style={{ fontSize: 11, color: "#475569", direction: "rtl" }}> ← שארית</span>
          </div>
        </div>
      ))}

      <div style={{ marginTop: 8, padding: "6px 10px", borderRadius: 6, background: "rgba(96,165,250,0.1)", fontSize: 12, color: "#60a5fa", direction: "rtl" }}>
        ✓ תשובה: {numerator}/{denominator} = <strong>{result}</strong>
        {remainder > 0 ? " (מספר מחזורי)" : ""}
      </div>
    </div>
  );
}

  const StepRow = ({ n, label, parts, highlight, note, division }) => (
    <div style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "flex-start" }}>
      <div style={{ minWidth: 22, height: 22, borderRadius: "50%", background: highlight || color, color: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 900, flexShrink: 0 }}>{n}</div>
      <div style={{ paddingTop: 2, flex: 1 }}>
        <div style={{ fontSize: 11, color: "#475569", marginBottom: 3 }}>{label}</div>
        <MathExpr parts={parts} />
        {note && <div style={{ fontSize: 11, color: "#475569", marginTop: 3, direction: "rtl" }}>{note}</div>}
        {division && <LongDivision numerator={division.numerator} denominator={division.denominator} />}
      </div>
    </div>
  );

  return (
    <div style={{ marginTop: 16, borderRadius: 14, overflow: "hidden", border: `1px solid ${color}33`, animation: "pop 0.35s ease" }}>
      <style>{`@keyframes pop { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }`}</style>

      {/* Header: triangle + formula */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", background: `linear-gradient(135deg, ${color}18, ${color}08)`, borderBottom: `1px solid ${color}22` }}>
        <DVTTriangle highlight={solve} />
        <div>
          <div style={{ fontSize: 11, color: "#475569", marginBottom: 3 }}>הנוסחה בה השתמשנו</div>
          <div style={{ fontSize: 22, fontWeight: 900, color, fontFamily: "monospace", direction: "ltr", letterSpacing: 1 }}>{formula}</div>
          <div style={{ fontSize: 12, color: "#64748b", marginTop: 6, lineHeight: 1.5 }}>{story}</div>
        </div>
      </div>

      {/* Steps */}
      <div style={{ padding: "14px 16px", background: "rgba(0,0,0,0.25)" }}>
        <div style={{ fontSize: 11, color: "#475569", fontWeight: 700, marginBottom: 12, textTransform: "uppercase", letterSpacing: 1 }}>שלבי הפתרון</div>

        {/* שלב 1: נוסחה */}
        <StepRow n={nextN()} label="הנוסחה" parts={[{ text: formula }]} />

        {/* שלב 2: הכנסת הנתונים */}
        <StepRow n={nextN()} label="הכנסת הנתונים שניתנו" parts={inputParts} />

        {/* שלב המרות */}
        {needsAnyConv && (
          <>
            <div style={{ margin: "6px 0 10px 0", padding: "8px 12px", borderRadius: 8, background: "rgba(255,193,7,0.07)", border: "1px solid rgba(255,193,7,0.2)", fontSize: 12, color: "#f59e0b" }}>
              ⚠️ לפני חישוב — חייבים לעבוד באותן יחידות בסיס (מטר, שניות, מ/ש)
            </div>
            {convSteps.map((cs, i) => {
              if (cs.subSteps) {
                // Speed conversion: show as two numbered sub-steps inside one block
                const n = nextN();
                return (
                  <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "flex-start" }}>
                    <div style={{ minWidth: 22, height: 22, borderRadius: "50%", background: fieldColor[cs.field], color: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 900, flexShrink: 0 }}>{n}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 11, color: "#475569", marginBottom: 6 }}>המרת מהירות ל-מ/ש <span style={{ color: "#374151" }}>(2 שלבים קטנים)</span></div>
                      {cs.subSteps.map((ss, j) => (
                        <div key={j} style={{ marginBottom: j < cs.subSteps.length - 1 ? 8 : 0, paddingRight: 4, borderRight: `2px solid ${fieldColor[cs.field]}44` }}>
                          <div style={{ fontSize: 11, color: "#475569", marginBottom: 2 }}>{ss.note}</div>
                          <MathExpr parts={ss.parts} />
                        </div>
                      ))}
                    </div>
                  </div>
                );
              }
              return (
                <StepRow key={i}
                  n={nextN()}
                  label={`המרת ${cs.field === "dist" ? "מרחק" : cs.field === "time" ? "זמן" : "מהירות"} ל-${cs.field === "dist" ? "מטרים" : cs.field === "time" ? "שניות" : "מ/ש"}`}
                  parts={cs.parts}
                  note={cs.explain}
                  division={cs.division || null}
                  highlight={fieldColor[cs.field]}
                />
              );
            })}
          </>
        )}

        {/* חישוב */}
        {calcMultiLine ? (
          <div style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "flex-start" }}>
            <div style={{ minWidth: 22, height: 22, borderRadius: "50%", background: color, color: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 900, flexShrink: 0 }}>{nextN()}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: "#475569", marginBottom: 8 }}>חישוב עם חוקי חזקות</div>
              <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 8, padding: "10px 12px", border: "1px solid rgba(255,255,255,0.06)" }}>
                {calcMultiLine.map((line, i) => {
                  const isResult = i === calcMultiLine.length - 1;
                  return (
                    <div key={i} style={{
                      marginBottom: i < calcMultiLine.length - 1 ? 6 : 0,
                      paddingTop: isResult ? 8 : 0,
                      borderTop: isResult ? "1px solid rgba(255,255,255,0.1)" : "none",
                    }}>
                      <MathExpr parts={line} />
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        ) : (
          <StepRow n={nextN()} label={needsAnyConv ? "חישוב עם הערכים המומרים" : "חישוב"} parts={calcParts} />
        )}

        {/* המרה חזרה לתוצאה */}
        {resultConvParts && (
          <StepRow n={nextN()} label={`המרת התוצאה ל-${resultUnit}`} parts={resultConvParts} note={resultConvNote} highlight={color} />
        )}
      </div>

      {/* Result */}
      <div style={{ padding: "12px 16px", background: `${color}14`, borderTop: `2px solid ${color}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 13, color: "#64748b" }}>✅ תשובה סופית:</span>
        <span style={{ fontSize: 26, fontWeight: 900, color, direction: "ltr" }}>
          <MathLine text={formatNum(result)} /> {resultUnit}
        </span>
      </div>

      {/* Tip */}
      <div style={{ padding: "12px 16px", background: "rgba(255,255,255,0.02)", borderTop: `1px solid rgba(255,255,255,0.05)` }}>
        <div style={{ fontSize: 13, color: "#94a3b8", lineHeight: 1.6 }}>{tip}</div>
        <div style={{ marginTop: 8, fontSize: 12, color: "#475569" }}>
          🔺 טריק המשולש: כסה את מה שאתה מחפש — מה שנשאר מראה איך לחשב אותו!
        </div>
      </div>
    </div>
  );
}

// Practice question bank - pairs of given values, one to solve
const PRACTICE_QUESTIONS = [
  { solve: "speed", distVal: "100", distUnit: 2, timeVal: "10", timeUnit: 0, label: "אופניים בפארק" },
  { solve: "speed", distVal: "1", distUnit: 3, timeVal: "30", timeUnit: 1, label: "מכונית בעיר" },
  { solve: "speed", distVal: "90", distUnit: 2, timeVal: "5", timeUnit: 1, label: "צנחן במצנח פתוח" },
  { solve: "speed", distVal: "400", distUnit: 3, timeVal: "2", timeUnit: 2, label: "רכבת מהירה" },
  { solve: "speed", distVal: "0.000003", distUnit: 2, timeVal: "0.000000000006", timeUnit: 0, label: "מולקולות אוויר" },
  { solve: "distance", distVal: "", distUnit: 2, timeVal: "3", timeUnit: 2, speedVal: "250", speedUnit: 1, label: "מטוס נוסעים" },
  { solve: "distance", distVal: "", distUnit: 3, timeVal: "45", timeUnit: 1, speedVal: "60", speedUnit: 1, label: "נסיעה בכביש" },
  { solve: "distance", distVal: "", distUnit: 2, timeVal: "20", timeUnit: 0, speedVal: "5", speedUnit: 0, label: "שחיין" },
  { solve: "time", distVal: "100", distUnit: 3, timeVal: "", timeUnit: 2, speedVal: "80", speedUnit: 1, label: "נסיעה לתל אביב" },
  { solve: "time", distVal: "42", distUnit: 3, timeVal: "", timeUnit: 1, speedVal: "12", speedUnit: 1, label: "מרתון" },
  { solve: "time", distVal: "300", distUnit: 2, timeVal: "", timeUnit: 0, speedVal: "3", speedUnit: 0, label: "ריצה קצרה" },
];

function App() {
  const [solve, setSolve] = useState("speed");
  const [distVal, setDistVal] = useState("");
  const [distUnit, setDistUnit] = useState(2);
  const [timeVal, setTimeVal] = useState("");
  const [timeUnit, setTimeUnit] = useState(0);
  const [speedVal, setSpeedVal] = useState("");
  const [speedUnit, setSpeedUnit] = useState(0);
  const [showSteps, setShowSteps] = useState(false);

  // Practice mode
  const [practiceQ, setPracticeQ] = useState(null); // current question
  const [practiceGuess, setPracticeGuess] = useState(""); // child's answer
  const [practiceRevealed, setPracticeRevealed] = useState(false);
  const [lastQIndex, setLastQIndex] = useState(-1);

  function loadPracticeQuestion() {
    let idx;
    do { idx = Math.floor(Math.random() * PRACTICE_QUESTIONS.length); }
    while (idx === lastQIndex && PRACTICE_QUESTIONS.length > 1);
    setLastQIndex(idx);
    const q = PRACTICE_QUESTIONS[idx];
    setPracticeQ(q);
    setPracticeGuess("");
    setPracticeRevealed(false);
    // Also load into calculator fields so StepByStep works
    setSolve(q.solve);
    setDistVal(q.distVal || "");
    setDistUnit(q.distUnit);
    setTimeVal(q.timeVal || "");
    setTimeUnit(q.timeUnit);
    setSpeedVal(q.speedVal || "");
    setSpeedUnit(q.speedUnit || 0);
    setShowSteps(false);
  }

  function exitPractice() {
    setPracticeQ(null);
    setPracticeGuess("");
    setPracticeRevealed(false);
    setDistVal(""); setTimeVal(""); setSpeedVal("");
    setShowSteps(false);
  }

  const dM = parseFloat(distVal) * (DIST_UNITS[distUnit]?.toM || 1);
  const tS = parseFloat(timeVal) * (TIME_UNITS[timeUnit]?.toS || 1);
  const vMS = parseFloat(speedVal) * (SPEED_UNITS[speedUnit]?.toMS || 1);

  let calcResult = null;
  if (solve === "speed" && dM && tS) calcResult = (dM / tS) / SPEED_UNITS[speedUnit].toMS;
  else if (solve === "distance" && vMS && tS) calcResult = (vMS * tS) / DIST_UNITS[distUnit].toM;
  else if (solve === "time" && dM && vMS) calcResult = (dM / vMS) / TIME_UNITS[timeUnit].toS;

  const canCalc = calcResult !== null && isFinite(calcResult);
  const solveColor = solve === "speed" ? "#60a5fa" : solve === "distance" ? "#34d399" : "#f59e0b";

  function changeSolve(key) {
    setSolve(key);
    setShowSteps(false);
    if (key === "distance") setDistVal("");
    if (key === "time") setTimeVal("");
    if (key === "speed") setSpeedVal("");
  }

  const fields = [
    { key: "distance", label: "📏 מרחק", val: distVal, setVal: setDistVal, unitIdx: distUnit, setUnit: setDistUnit, units: DIST_UNITS, color: "#34d399" },
    { key: "time", label: "⏱ זמן", val: timeVal, setVal: setTimeVal, unitIdx: timeUnit, setUnit: setTimeUnit, units: TIME_UNITS, color: "#f59e0b" },
    { key: "speed", label: "⚡ מהירות", val: speedVal, setVal: setSpeedVal, unitIdx: speedUnit, setUnit: setSpeedUnit, units: SPEED_UNITS, color: "#60a5fa" },
  ];

  const resultUnit = solve === "speed" ? SPEED_UNITS[speedUnit].label : solve === "distance" ? DIST_UNITS[distUnit].label : TIME_UNITS[timeUnit].label;
  const solveLabel = solve === "speed" ? "מהירות" : solve === "distance" ? "מרחק" : "זמן";

  // Check if practice guess is correct (within 1% tolerance)
  const guessNum = parseFloat(practiceGuess);
  const practiceCorrect = calcResult !== null && !isNaN(guessNum) &&
    Math.abs(guessNum - calcResult) / Math.abs(calcResult) < 0.01;

  return (
    <div dir="rtl" style={{ minHeight: "100vh", background: "linear-gradient(160deg, #0d1b2a 0%, #1a1040 60%, #0d1b2a 100%)", fontFamily: "'Segoe UI', Tahoma, Arial, sans-serif", padding: "20px 16px 48px", color: "#e2e8f0" }}>
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 20 }}>
        <div style={{ fontSize: 36, marginBottom: 4 }}>⚡</div>
        <h1 style={{ margin: 0, fontSize: 22, fontWeight: 900, background: "linear-gradient(90deg, #60a5fa, #a78bfa, #34d399)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
          מהירות · מרחק · זמן
        </h1>

        {/* Practice button */}
        <button
          onClick={practiceQ ? exitPractice : loadPracticeQuestion}
          style={{
            marginTop: 12,
            padding: "9px 22px",
            borderRadius: 20,
            border: practiceQ ? "2px solid #f472b6" : "2px solid #a78bfa",
            background: practiceQ ? "rgba(244,114,182,0.12)" : "rgba(167,139,250,0.12)",
            color: practiceQ ? "#f472b6" : "#a78bfa",
            fontWeight: 800,
            fontSize: 13,
            cursor: "pointer",
          }}
        >
          {practiceQ ? "✕ סגור תרגול" : "🎯 תרגל שאלה!"}
        </button>
      </div>

      <div style={{ maxWidth: 460, margin: "0 auto" }}>

        {/* ===== PRACTICE MODE ===== */}
        {practiceQ && (
          <div style={{ marginBottom: 16 }}>
            {/* Question card */}
            <div style={{ borderRadius: 14, border: "2px solid #a78bfa44", background: "rgba(167,139,250,0.07)", padding: 16, marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 13, fontWeight: 800, color: "#a78bfa" }}>🎯 שאלה לתרגול</span>
                <span style={{ fontSize: 12, color: "#64748b" }}>{practiceQ.label}</span>
              </div>

              {/* Given values */}
              <div style={{ fontSize: 11, color: "#64748b", marginBottom: 8 }}>נתון:</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
                {practiceQ.distVal && (
                  <div style={{ padding: "8px 14px", borderRadius: 10, background: "#34d39922", border: "1px solid #34d39955", fontSize: 14, color: "#34d399", fontWeight: 700, direction: "ltr" }}>
                    {practiceQ.distVal} <span style={{ direction: "rtl" }}>{DIST_UNITS[practiceQ.distUnit].label}</span>
                  </div>
                )}
                {practiceQ.timeVal && (
                  <div style={{ padding: "8px 14px", borderRadius: 10, background: "#f59e0b22", border: "1px solid #f59e0b55", fontSize: 14, color: "#f59e0b", fontWeight: 700, direction: "ltr" }}>
                    {practiceQ.timeVal} <span style={{ direction: "rtl" }}>{TIME_UNITS[practiceQ.timeUnit].label}</span>
                  </div>
                )}
                {practiceQ.speedVal && (
                  <div style={{ padding: "8px 14px", borderRadius: 10, background: "#60a5fa22", border: "1px solid #60a5fa55", fontSize: 14, color: "#60a5fa", fontWeight: 700, direction: "ltr" }}>
                    {practiceQ.speedVal} <span style={{ direction: "rtl" }}>{SPEED_UNITS[practiceQ.speedUnit || 0].label}</span>
                  </div>
                )}
              </div>

              {/* What to find */}
              <div style={{ fontSize: 11, color: "#64748b", marginBottom: 8 }}>מה לחשב: <span style={{ color: solveColor, fontWeight: 700 }}>{solveLabel}</span> ב-<span style={{ color: solveColor }}>{resultUnit}</span></div>

              {/* Guess input */}
              {!practiceRevealed && (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input
                    type="number"
                    value={practiceGuess}
                    onChange={e => setPracticeGuess(e.target.value)}
                    placeholder="הכנס את תשובתך..."
                    style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: `1px solid ${practiceGuess ? (practiceCorrect ? "#34d399" : "#f472b6") : "rgba(255,255,255,0.15)"}`, background: "rgba(255,255,255,0.06)", color: "#e2e8f0", fontSize: 15, outline: "none", direction: "ltr" }}
                  />
                  <span style={{ fontSize: 12, color: "#64748b", whiteSpace: "nowrap" }}>{resultUnit}</span>
                </div>
              )}

              {/* Feedback */}
              {!practiceRevealed && practiceGuess && (
                <div style={{ marginTop: 8, fontSize: 13, color: practiceCorrect ? "#34d399" : "#f472b6", fontWeight: 700 }}>
                  {practiceCorrect ? "✅ נכון מאוד! עכשיו ראה את הפתרון המלא 👇" : "❌ לא מדויק, נסה שוב או ראה פתרון"}
                </div>
              )}
            </div>

            {/* Action buttons */}
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <button
                onClick={() => { setPracticeRevealed(true); setShowSteps(true); }}
                style={{ flex: 1, padding: "11px", borderRadius: 11, border: "none", background: `linear-gradient(135deg, ${solveColor}cc, ${solveColor}77)`, color: "#0f172a", fontWeight: 900, fontSize: 14, cursor: "pointer" }}
              >
                פתרון מלא 🔍
              </button>
              <button
                onClick={loadPracticeQuestion}
                style={{ padding: "11px 16px", borderRadius: 11, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.05)", color: "#94a3b8", fontWeight: 700, fontSize: 13, cursor: "pointer" }}
              >
                שאלה חדשה 🔀
              </button>
            </div>

            {/* Full solution via StepByStep */}
            {practiceRevealed && canCalc && (
              <StepByStep
                solve={solve}
                distVal={distVal} distUnit={distUnit}
                timeVal={timeVal} timeUnit={timeUnit}
                speedVal={speedVal} speedUnit={speedUnit}
                result={calcResult}
              />
            )}
          </div>
        )}

        {/* ===== NORMAL CALCULATOR MODE ===== */}
        {!practiceQ && (
          <>
            {/* Solve selector */}
            <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 14, padding: 14, marginBottom: 12, border: "1px solid rgba(255,255,255,0.07)" }}>
              <div style={{ fontSize: 11, color: "#475569", marginBottom: 8, fontWeight: 700 }}>מה לחשב?</div>
              <div style={{ display: "flex", gap: 8 }}>
                {[{ key: "speed", label: "⚡ מהירות", color: "#60a5fa" }, { key: "distance", label: "📏 מרחק", color: "#34d399" }, { key: "time", label: "⏱ זמן", color: "#f59e0b" }].map((opt) => (
                  <button key={opt.key} onClick={() => changeSolve(opt.key)} style={{ flex: 1, padding: "9px 4px", borderRadius: 10, border: `2px solid ${solve === opt.key ? opt.color : "transparent"}`, background: solve === opt.key ? `${opt.color}22` : "rgba(255,255,255,0.04)", color: solve === opt.key ? opt.color : "#64748b", cursor: "pointer", fontWeight: 700, fontSize: 12, transition: "all 0.2s" }}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Inputs */}
            <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 14, padding: 14, border: "1px solid rgba(255,255,255,0.07)", marginBottom: 12 }}>
              {fields.map((f) => {
                const isTarget = f.key === solve;
                return (
                  <div key={f.key} style={{ marginBottom: 12 }}>
                    <label style={{ fontSize: 11, color: isTarget ? f.color : "#64748b", display: "block", marginBottom: 5, fontWeight: isTarget ? 700 : 500 }}>
                      {f.label}
                      {isTarget && <span style={{ marginRight: 6, fontSize: 10, background: `${f.color}22`, color: f.color, padding: "2px 7px", borderRadius: 20, border: `1px solid ${f.color}44` }}>יחושב</span>}
                    </label>
                    <div style={{ display: "flex", gap: 6 }}>
                      <input
                        type="number"
                        value={isTarget ? "" : f.val}
                        onChange={(e) => { f.setVal(e.target.value); setShowSteps(false); }}
                        placeholder={isTarget ? "← התוצאה" : "הכנס מספר"}
                        disabled={isTarget}
                        style={{ flex: 1, padding: "9px 11px", borderRadius: 9, border: `1px solid ${isTarget ? f.color + "33" : "rgba(255,255,255,0.1)"}`, background: isTarget ? `${f.color}09` : "rgba(255,255,255,0.06)", color: "#e2e8f0", fontSize: 14, outline: "none", direction: "ltr", cursor: isTarget ? "not-allowed" : "text" }}
                      />
                      <select value={f.unitIdx} onChange={(e) => { f.setUnit(parseInt(e.target.value)); setShowSteps(false); }} style={{ padding: "9px 6px", borderRadius: 9, border: "1px solid rgba(255,255,255,0.1)", background: "#1e293b", color: "#cbd5e1", fontSize: 11, cursor: "pointer" }}>
                        {f.units.map((u, i) => <option key={i} value={i}>{u.label}</option>)}
                      </select>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* CTA */}
            {canCalc && (
              <button onClick={() => setShowSteps(true)} style={{ width: "100%", padding: "13px", borderRadius: 12, border: "none", background: `linear-gradient(135deg, ${solveColor}dd, ${solveColor}88)`, color: "#0f172a", fontWeight: 900, fontSize: 15, cursor: "pointer", marginBottom: 4, boxShadow: `0 4px 20px ${solveColor}44` }}>
                חשב והסבר לי! 🚀
              </button>
            )}
            {!canCalc && (distVal || timeVal || speedVal) && (
              <div style={{ textAlign: "center", color: "#475569", fontSize: 12, marginBottom: 8, padding: 8 }}>נא להכניס שני נתונים</div>
            )}

            {showSteps && canCalc && (
              <StepByStep
                solve={solve}
                distVal={distVal} distUnit={distUnit}
                timeVal={timeVal} timeUnit={timeUnit}
                speedVal={speedVal} speedUnit={speedUnit}
                result={calcResult}
              />
            )}
          </>
        )}

        {/* Formula reference */}
        <div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          {[{ f: "v = d ÷ t", label: "מהירות", color: "#60a5fa" }, { f: "d = v × t", label: "מרחק", color: "#34d399" }, { f: "t = d ÷ v", label: "זמן", color: "#f59e0b" }].map((item) => (
            <div key={item.f} style={{ padding: "9px 4px", borderRadius: 9, background: "rgba(255,255,255,0.03)", border: `1px solid ${item.color}22`, textAlign: "center" }}>
              <div style={{ fontSize: 11, fontFamily: "monospace", color: item.color, direction: "ltr", marginBottom: 2 }}>{item.f}</div>
              <div style={{ fontSize: 10, color: "#475569" }}>{item.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
